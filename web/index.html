<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Codex LAN</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main>
    <h1>Codex LAN</h1>
    <p class="page-copy">Small-screen Codex control for trusted LAN use.</p>

    <section class="panel stack-gap">
      <label for="projectSelect">Project</label>
      <select id="projectSelect"></select>

      <label for="executionModeSelect">Execution Mode</label>
      <select id="executionModeSelect">
        <option value="readonly">Read-only</option>
        <option value="auto-edit">Auto Edit</option>
        <option value="full-auto">Full Auto</option>
      </select>

      <label for="promptInput">Prompt</label>
      <textarea id="promptInput" rows="6" placeholder="Enter prompt..."></textarea>

      <div id="creditsBox">Credits Remaining: (unknown)</div>

      <button id="runButton">Run</button>
      <div id="statusBox">Ready.</div>
    </section>

    <section class="panel stack-gap">
      <div class="section-heading-row">
        <h2>Recent Runs</h2>
      </div>

      <label for="runSearchInput">Search Runs</label>
      <input
        id="runSearchInput"
        type="text"
        placeholder="Search by project or prompt..."
      />

      <ul id="runsList"></ul>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
